name: CI Image

on:
  push:
    branches:
      - master
      - main
    paths:
      - Dockerfile.ci
      - pyproject.toml
      - uv.lock
      - .github/workflows/ci-image.yml
  workflow_dispatch:

env:
  CI_IMAGE: ghcr.io/deeptb-lab/e3crys/ci:py3.12-cpu

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build CI Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: |
            ${{ env.CI_IMAGE }}
            ghcr.io/deeptb-lab/e3crys/ci:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
